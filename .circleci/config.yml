version: 2.1
orbs:
  ruby-rails: sul-dlss/ruby-rails@4.8.0
workflows:
  build:
    jobs:
      - ruby-rails/herblint:
          name: herblint
      - ruby-rails/stylelint:
          name: stylelint
      - ruby-rails/lint-js
      - ruby-rails/lint:
          name: lint
          context: dlss
      - ruby-rails/lint-erb:
          context: dlss
      - ruby-rails/test-rails:
          name: test
          context: dlss
          install-chrome: true
          parallelism: 4
          before-test:
            - run:
                name: Prepare for running specs (install JS dependencies and build assets)
                command: bin/rake spec:prepare
